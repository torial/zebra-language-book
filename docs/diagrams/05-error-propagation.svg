<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #1f2937; }
      .section { font-size: 14px; font-weight: bold; fill: #2c5aa0; }
      .ok-box { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .err-box { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .code { font-size: 12px; fill: #1f2937; font-family: 'Monaco', monospace; }
      .label { font-size: 13px; fill: #374151; }
      .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6b7280" />
    </marker>
  </defs>

  <text x="500" y="40" class="title" text-anchor="middle">Error Propagation with Result Types</text>

  <!-- Success path -->
  <g>
    <text x="60" y="100" class="section">Success Path: Ok(T)</text>

    <circle cx="100" cy="150" r="25" class="ok-box"/>
    <text x="100" y="160" class="code" text-anchor="middle" font-weight="bold">Ok</text>

    <path d="M 130 150 L 200 150" class="arrow"/>
    <circle cx="230" cy="150" r="25" class="ok-box"/>
    <text x="230" y="155" class="label" text-anchor="middle" font-size="11">Process</text>
    <text x="230" y="165" class="label" text-anchor="middle" font-size="11">Value</text>

    <path d="M 260 150 L 330 150" class="arrow"/>
    <circle cx="360" cy="150" r="25" class="ok-box"/>
    <text x="360" y="160" class="code" text-anchor="middle" font-weight="bold">Ok</text>

    <path d="M 390 150 L 460 150" class="arrow"/>
    <circle cx="490" cy="150" r="25" class="ok-box"/>
    <text x="490" y="160" class="code" text-anchor="middle" font-weight="bold">Ok</text>

    <path d="M 520 150 L 590 150" class="arrow"/>
    <rect x="600" y="125" width="150" height="50" class="ok-box" rx="5"/>
    <text x="675" y="155" class="label" text-anchor="middle" font-weight="bold">Return Ok</text>
  </g>

  <!-- Error path -->
  <g>
    <text x="60" y="260" class="section">Error Path: Err(E) Bubbles Up</text>

    <circle cx="100" cy="310" r="25" class="ok-box"/>
    <text x="100" y="320" class="code" text-anchor="middle" font-weight="bold">Ok</text>

    <path d="M 130 310 L 200 310" class="arrow"/>
    <circle cx="230" cy="310" r="25" class="err-box"/>
    <text x="230" y="320" class="code" text-anchor="middle" font-weight="bold">Err</text>
    <text x="230" y="345" class="label" text-anchor="middle" font-size="11">Error occurs</text>

    <!-- Error propagates up -->
    <path d="M 260 310 L 330 310" stroke="#dc2626" stroke-width="3" fill="none"/>
    <circle cx="360" cy="310" r="25" class="err-box"/>
    <text x="360" y="320" class="code" text-anchor="middle" font-weight="bold">Err</text>
    <text x="360" y="345" class="label" text-anchor="middle" font-size="11">Passed up</text>

    <path d="M 390 310 L 460 310" stroke="#dc2626" stroke-width="3" fill="none"/>
    <circle cx="490" cy="310" r="25" class="err-box"/>
    <text x="490" y="320" class="code" text-anchor="middle" font-weight="bold">Err</text>
    <text x="490" y="345" class="label" text-anchor="middle" font-size="11">Passed up</text>

    <path d="M 520 310 L 590 310" stroke="#dc2626" stroke-width="3" fill="none"/>
    <rect x="600" y="285" width="150" height="50" class="err-box" rx="5"/>
    <text x="675" y="315" class="label" text-anchor="middle" font-weight="bold">Return Err</text>
  </g>

  <!-- Code example -->
  <g>
    <text x="60" y="420" class="section">Code Example: Error Propagation</text>

    <rect x="50" y="440" width="900" height="220" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="3"/>

    <text x="70" y="465" class="code">def load_config(path as str) as Result(Config, str)</text>
    <text x="70" y="490" class="code">  var content = File.read(path)  # Returns Result</text>
    <text x="70" y="515" class="code">  if content.isErr()  # Check for error</text>
    <text x="70" y="540" class="code">    return content  # Propagate error up</text>

    <text x="70" y="565" class="code">  var data = parse_json(content.okValue())  # Process if Ok</text>
    <text x="70" y="590" class="code">  if data.isErr()</text>
    <text x="70" y="615" class="code">    return data  # Propagate parsing error</text>

    <text x="70" y="640" class="code">  return Result.ok(create_config(data.okValue()))</text>
  </g>
</svg>
