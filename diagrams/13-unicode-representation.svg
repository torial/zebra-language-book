<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #1f2937; }
      .section { font-size: 14px; font-weight: bold; fill: #2c5aa0; }
      .code { font-size: 12px; fill: #1f2937; font-family: 'Monaco', monospace; }
      .label { font-size: 13px; fill: #374151; }
      .box { fill: #e8f4f8; stroke: #2c5aa0; stroke-width: 1; }
      .char-box { fill: #dbeafe; stroke: #0284c7; stroke-width: 1; }
      .code-box { fill: #ecfdf5; stroke: #059669; stroke-width: 1; }
      .example { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1; }
    </style>
  </defs>

  <text x="500" y="40" class="title" text-anchor="middle">Unicode Representation in Zebra</text>

  <!-- ASCII vs Unicode -->
  <g>
    <text x="60" y="100" class="section">ASCII (Single Byte per Character)</text>

    <rect x="50" y="120" width="400" height="100" class="example" rx="3"/>
    <text x="60" y="145" class="label" font-weight="bold">String: "Hello"</text>

    <g>
      <rect x="60" y="160" width="35" height="35" class="char-box"/>
      <text x="77" y="187" class="code" text-anchor="middle">H</text>

      <rect x="105" y="160" width="35" height="35" class="char-box"/>
      <text x="122" y="187" class="code" text-anchor="middle">e</text>

      <rect x="150" y="160" width="35" height="35" class="char-box"/>
      <text x="167" y="187" class="code" text-anchor="middle">l</text>

      <rect x="195" y="160" width="35" height="35" class="char-box"/>
      <text x="212" y="187" class="code" text-anchor="middle">l</text>

      <rect x="240" y="160" width="35" height="35" class="char-box"/>
      <text x="257" y="187" class="code" text-anchor="middle">o</text>
    </g>

    <text x="60" y="220" class="label">Bytes: 48 65 6C 6C 6F  (5 bytes)</text>
    <text x="60" y="240" class="label">Code points: U+0048, U+0065, U+006C, U+006C, U+006F</text>
  </g>

  <!-- Unicode Example -->
  <g>
    <text x="550" y="100" class="section">Unicode (Multi-byte for Special Chars)</text>

    <rect x="540" y="120" width="400" height="100" class="example" rx="3"/>
    <text x="550" y="145" class="label" font-weight="bold">String: "Hello🌍"</text>

    <g>
      <rect x="550" y="160" width="35" height="35" class="char-box"/>
      <text x="567" y="187" class="code" text-anchor="middle">H</text>

      <rect x="595" y="160" width="35" height="35" class="char-box"/>
      <text x="612" y="187" class="code" text-anchor="middle">e</text>

      <rect x="640" y="160" width="35" height="35" class="char-box"/>
      <text x="657" y="187" class="code" text-anchor="middle">l</text>

      <rect x="685" y="160" width="35" height="35" class="char-box"/>
      <text x="702" y="187" class="code" text-anchor="middle">l</text>

      <rect x="730" y="160" width="35" height="35" class="char-box"/>
      <text x="747" y="187" class="code" text-anchor="middle">o</text>

      <rect x="775" y="160" width="55" height="35" class="char-box" style="fill: #fef3c7; stroke: #d97706;"/>
      <text x="802" y="187" class="code" text-anchor="middle">🌍</text>
    </g>

    <text x="550" y="220" class="label">Bytes: 48 65 6C 6C 6F F0 9F 8C 8D  (9 bytes total)</text>
    <text x="550" y="240" class="label">Emoji is 4 bytes in UTF-8 (multi-byte character)</text>
  </g>

  <!-- Zebra String Methods -->
  <g>
    <text x="60" y="300" class="section">How Zebra Handles Unicode Strings</text>

    <!-- String length -->
    <rect x="50" y="320" width="900" height="80" class="code-box" rx="3"/>
    <text x="70" y="345" class="label" font-weight="bold">.len — Returns byte count (UTF-8 encoded)</text>
    <text x="70" y="365" class="code">var str = "Hello🌍"</text>
    <text x="70" y="385" class="code">print str.len  # Outputs: 9 (5 ASCII bytes + 4 UTF-8 bytes for emoji)</text>
  </g>

  <!-- String iteration -->
  <g>
    <rect x="50" y="420" width="900" height="100" class="code-box" rx="3"/>
    <text x="70" y="445" class="label" font-weight="bold">.charAt(index) — Gets byte at position</text>
    <text x="70" y="465" class="code">var str = "Hello"</text>
    <text x="70" y="485" class="code">print str.charAt(0)  # "H"</text>
    <text x="70" y="505" class="code">print str.charAt(4)  # "o"</text>
  </g>

  <!-- String operations -->
  <g>
    <rect x="50" y="540" width="900" height="80" class="code-box" rx="3"/>
    <text x="70" y="565" class="label" font-weight="bold">.substring(start, end) — Extract portion</text>
    <text x="70" y="585" class="code">var str = "Hello World"</text>
    <text x="70" y="605" class="code">print str.substring(0, 5)  # "Hello"</text>
  </g>

  <!-- Key points -->
  <g>
    <rect x="50" y="650" width="900" height="40" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" rx="3"/>
    <text x="70" y="673" class="label">✓ Zebra uses UTF-8 encoding  ✓ String operations work with bytes  ✓ Use .len for byte count, not character count</text>
  </g>
</svg>
