<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #1f2937; }
      .section { font-size: 14px; font-weight: bold; fill: #2c5aa0; }
      .data-box { fill: #dbeafe; stroke: #0284c7; stroke-width: 2; }
      .process-box { fill: #e0e7ff; stroke: #4f46e5; stroke-width: 2; }
      .code { font-size: 12px; fill: #1f2937; font-family: 'Monaco', monospace; }
      .label { font-size: 13px; fill: #374151; }
      .arrow { stroke: #0284c7; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#0284c7" />
    </marker>
  </defs>

  <text x="500" y="40" class="title" text-anchor="middle">Pipeline Data Flow with -&gt;</text>

  <!-- Without pipeline: nested calls -->
  <g>
    <text x="60" y="90" class="section">Without Pipeline (Nested Calls)</text>

    <rect x="50" y="110" width="400" height="100" fill="#fef3c7" stroke="#d97706" stroke-width="1" rx="3"/>
    <text x="70" y="135" class="code">var text = "HELLO WORLD"</text>
    <text x="70" y="160" class="code">var result =</text>
    <text x="70" y="180" class="code">  text.lower().split(" ")</text>
    <text x="70" y="205" class="label" fill="#6b7280" font-size="11">Hard to follow nesting</text>
  </g>

  <!-- With pipeline: clear flow -->
  <g>
    <text x="550" y="90" class="section">With Pipeline (Left-to-Right)</text>

    <rect x="540" y="110" width="400" height="130" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" rx="3"/>
    <text x="560" y="135" class="code">var result = text</text>
    <text x="560" y="160" class="code">  -> .lower()</text>
    <text x="560" y="185" class="code">  -> .split(" ")</text>
    <text x="560" y="210" class="code">  -> .at(0)</text>
    <text x="700" y="240" class="label" fill="#16a34a" font-weight="bold">Much clearer!</text>
  </g>

  <!-- Detailed pipeline flow -->
  <g>
    <text x="60" y="290" class="section">Step-by-Step Pipeline Execution</text>

    <!-- Input -->
    <rect x="60" y="320" width="140" height="50" class="data-box" rx="5"/>
    <text x="130" y="350" class="label" text-anchor="middle" font-weight="bold">"HELLO"</text>

    <!-- Step 1 -->
    <path d="M 210 345 L 260 345" class="arrow"/>
    <rect x="270" y="320" width="140" height="50" class="process-box" rx="5"/>
    <text x="340" y="335" class="label" text-anchor="middle" font-weight="bold">.lower()</text>
    <text x="340" y="350" class="label" text-anchor="middle" font-size="11">converts</text>

    <!-- Result 1 -->
    <path d="M 420 345 L 470 345" class="arrow"/>
    <rect x="480" y="320" width="140" height="50" class="data-box" rx="5"/>
    <text x="550" y="350" class="label" text-anchor="middle" font-weight="bold">"hello"</text>

    <!-- Step 2 -->
    <path d="M 630 345 L 680 345" class="arrow"/>
    <rect x="690" y="320" width="140" height="50" class="process-box" rx="5"/>
    <text x="760" y="335" class="label" text-anchor="middle" font-weight="bold">.split(" ")</text>
    <text x="760" y="350" class="label" text-anchor="middle" font-size="11">breaks up</text>

    <!-- Result 2 -->
    <path d="M 840" y="345" L="890" y="345" class="arrow"/>
    <rect x="900" y="315" width="90" height="60" class="data-box" rx="5"/>
    <text x="945" y="335" class="label" text-anchor="middle" font-size="11">List(str):</text>
    <text x="945" y="350" class="code" text-anchor="middle" font-size="10">["hello"]</text>
  </g>

  <!-- Pipeline with custom functions -->
  <g>
    <text x="60" y="450" class="section">Pipeline with Custom Functions</text>

    <rect x="50" y="470" width="900" height="180" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="3"/>

    <text x="70" y="495" class="code" font-weight="bold">def double(x)</text>
    <text x="70" y="515" class="code">  return x * 2</text>

    <text x="70" y="540" class="code" font-weight="bold">def add_ten(x)</text>
    <text x="70" y="560" class="code">  return x + 10</text>

    <text x="70" y="585" class="code" font-weight="bold">def format_result(x)</text>
    <text x="70" y="605" class="code">  return "Result: ".concat(x.toString())</text>

    <text x="70" y="630" class="code">var output = 5</text>
    <text x="70" y="650" class="code">  -> double(.)    # 5 * 2 = 10</text>
  </g>

  <!-- Composite example -->
  <g>
    <rect x="50" y="685" width="900" height="20" class="data-box" rx="3"/>
  </g>
</svg>
