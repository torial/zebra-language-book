<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #1f2937; }
      .client-box { fill: #dbeafe; stroke: #0284c7; stroke-width: 2; }
      .server-box { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .request-box { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; }
      .response-box { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .label { font-size: 13px; fill: #374151; }
      .code { font-size: 11px; fill: #1f2937; font-family: 'Monaco', monospace; }
      .arrow { stroke: #6b7280; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .return-arrow { stroke: #d97706; stroke-width: 2.5; fill: none; marker-end: url(#ret-arrow); stroke-dasharray: 3,3; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#6b7280" />
    </marker>
    <marker id="ret-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#d97706" />
    </marker>
  </defs>

  <text x="500" y="40" class="title" text-anchor="middle">Project 2: HTTP Server - Request/Response Cycle</text>

  <!-- Client side -->
  <g>
    <rect x="50" y="100" width="200" height="100" class="client-box" rx="5"/>
    <text x="150" y="130" class="label" text-anchor="middle" font-weight="bold">Client</text>
    <text x="150" y="155" class="code" text-anchor="middle">curl http://</text>
    <text x="150" y="170" class="code" text-anchor="middle">localhost:8080</text>
  </g>

  <!-- Request arrow -->
  <path d="M 260 150 L 320 150" class="arrow"/>
  <text x="290" y="140" class="label" text-anchor="middle" font-size="11">HTTP</text>
  <text x="290" y="155" class="label" text-anchor="middle" font-size="11">Request</text>

  <!-- Server listening -->
  <g>
    <rect x="330" y="100" width="200" height="100" class="server-box" rx="5"/>
    <text x="430" y="125" class="label" text-anchor="middle" font-weight="bold">Server</text>
    <text x="430" y="150" class="code" text-anchor="middle">Listen port</text>
    <text x="430" y="170" class="code" text-anchor="middle">8080</text>
  </g>

  <!-- Request details -->
  <g>
    <rect x="560" y="100" width="380" height="100" class="request-box" rx="5"/>
    <text x="750" y="125" class="label" text-anchor="middle" font-weight="bold">HttpRequest</text>
    <text x="580" y="150" class="code">Method: GET</text>
    <text x="580" y="170" class="code">Path: /api/users</text>
    <text x="750" y="150" class="code">Headers: ...</text>
    <text x="750" y="170" class="code">Body: (empty)</text>
  </g>

  <!-- Router dispatch -->
  <g>
    <path d="M 430 200 L 430 250" class="arrow"/>
    <text x="440" y="225" class="label" font-size="11">Route</text>

    <rect x="330" y="260" width="200" height="80" class="server-box" rx="5"/>
    <text x="430" y="285" class="label" text-anchor="middle" font-weight="bold">Router</text>
    <text x="430" y="305" class="code" text-anchor="middle">/api/users →</text>
    <text x="430" y="320" class="code" text-anchor="middle">UserHandler</text>
  </g>

  <!-- Handler processes request -->
  <g>
    <path d="M 430 340 L 430 380" class="arrow"/>
    <text x="440" y="360" class="label" font-size="11">Handle</text>

    <rect x="330" y="390" width="200" height="80" class="server-box" rx="5"/>
    <text x="430" y="415" class="label" text-anchor="middle" font-weight="bold">Handler</text>
    <text x="430" y="440" class="code" text-anchor="middle">Process & create</text>
    <text x="430" y="455" class="code" text-anchor="middle">HttpResponse</text>
  </g>

  <!-- Response details -->
  <g>
    <path d="M 430 470 L 430 510" class="return-arrow"/>
    <text x="440" y="490" class="label" font-size="11">Response</text>

    <rect x="560" y="520" width="380" height="100" class="response-box" rx="5"/>
    <text x="750" y="545" class="label" text-anchor="middle" font-weight="bold">HttpResponse</text>
    <text x="580" y="570" class="code">Status: 200 OK</text>
    <text x="580" y="585" class="code">Body: {"users": []}</text>
    <text x="750" y="570" class="code">Headers: ...</text>
    <text x="750" y="585" class="code">Content-Type: json</text>
  </g>

  <!-- Send to client -->
  <g>
    <path d="M 560 570 L 260 570" class="return-arrow"/>
    <text x="410" y="555" class="label" font-size="11">HTTP Response</text>

    <rect x="50" y="520" width="200" height="100" class="client-box" rx="5"/>
    <text x="150" y="545" class="label" text-anchor="middle" font-weight="bold">Client</text>
    <text x="150" y="570" class="code" text-anchor="middle">Receives</text>
    <text x="150" y="585" class="code" text-anchor="middle">response</text>
  </g>

  <!-- Full cycle sequence -->
  <g>
    <rect x="50" y="650" width="900" height="40" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" rx="3"/>
    <text x="70" y="673" class="code" font-size="11">Request: GET /api/users → Router finds UserHandler → Handler processes → Response 200 OK → Send to client</text>
  </g>
</svg>
