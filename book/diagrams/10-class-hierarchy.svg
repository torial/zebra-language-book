<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #1f2937; }
      .base-box { fill: #fecaca; stroke: #dc2626; stroke-width: 2; }
      .child-box { fill: #bfdbfe; stroke: #0284c7; stroke-width: 2; }
      .grandchild-box { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
      .label { font-size: 13px; fill: #374151; }
      .code { font-size: 12px; fill: #1f2937; font-family: 'Monaco', monospace; }
      .inherit-arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .method-label { font-size: 10px; fill: #6b7280; font-style: italic; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6b7280" />
    </marker>
  </defs>

  <text x="500" y="40" class="title" text-anchor="middle">Inheritance Hierarchy Example</text>

  <!-- Base class -->
  <g>
    <rect x="350" y="80" width="300" height="140" class="base-box" rx="5"/>
    <text x="500" y="105" class="label" text-anchor="middle" font-weight="bold">class Animal</text>
    <line x1="350" y1="115" x2="650" y2="115" stroke="#dc2626" stroke-width="1"/>
    <text x="365" y="135" class="code">var name as str</text>
    <text x="365" y="155" class="code">def speak as str</text>
    <text x="365" y="175" class="code">def move as str</text>
    <text x="365" y="195" class="code">def sleep()</text>
    <text x="365" y="215" class="method-label">(Base behavior)</text>
  </g>

  <!-- Dog inherits from Animal -->
  <g>
    <!-- Inheritance line -->
    <path d="M 450 220 L 400 260" class="inherit-arrow"/>
    <path d="M 550 220 L 600 260" class="inherit-arrow"/>

    <!-- Dog class -->
    <rect x="250" y="270" width="300" height="160" class="child-box" rx="5"/>
    <text x="400" y="295" class="label" text-anchor="middle" font-weight="bold">class Dog extends Animal</text>
    <line x1="250" y1="305" x2="550" y2="305" stroke="#0284c7" stroke-width="1"/>
    <text x="265" y="325" class="code">var breed as str</text>
    <text x="265" y="345" class="code">def speak as str</text>
    <text x="265" y="365" class="code">  return "Woof!"</text>
    <text x="265" y="385" class="code">def fetch(item as str)</text>
    <text x="265" y="405" class="code">  # Dog-specific</text>
    <text x="265" y="425" class="method-label">(Inherits name, move,</text>
    <text x="265" y="438" class="method-label">sleep from Animal)</text>
  </g>

  <!-- Cat inherits from Animal -->
  <g>
    <!-- Inheritance line -->
    <path d="M 550 220 L 600 260" class="inherit-arrow"/>
    <path d="M 650 220 L 700 260" class="inherit-arrow"/>

    <!-- Cat class -->
    <rect x="550" y="270" width="300" height="160" class="child-box" rx="5"/>
    <text x="700" y="295" class="label" text-anchor="middle" font-weight="bold">class Cat extends Animal</text>
    <line x1="550" y1="305" x2="850" y2="305" stroke="#0284c7" stroke-width="1"/>
    <text x="565" y="325" class="code">var lives as int = 9</text>
    <text x="565" y="345" class="code">def speak as str</text>
    <text x="565" y="365" class="code">  return "Meow!"</text>
    <text x="565" y="385" class="code">def scratch()</text>
    <text x="565" y="405" class="code">  # Cat-specific</text>
    <text x="565" y="425" class="method-label">(Inherits name, move,</text>
    <text x="565" y="438" class="method-label">sleep from Animal)</text>
  </g>

  <!-- Method resolution example -->
  <g>
    <text x="50" y="500" class="label" font-weight="bold">Method Resolution with super()</text>

    <rect x="50" y="520" width="900" height="160" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="3"/>

    <text x="70" y="545" class="code">class Dog extends Animal</text>
    <text x="70" y="565" class="code">  def speak as str</text>
    <text x="70" y="585" class="code">    var base_sound = super.speak()  # "sound"</text>
    <text x="70" y="605" class="code">    return "Woof! ".concat(base_sound)</text>

    <text x="70" y="635" class="code">var dog = Dog()</text>
    <text x="70" y="655" class="code">dog.speak()  # Returns: "Woof! sound"</text>
  </g>
</svg>
